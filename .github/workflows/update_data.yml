name: Update Stock Scanner Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r stock-scanner/requirements.txt

      - name: Run scanner
        working-directory: stock-scanner
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python main.py

      - name: Sync root docs JSON
        run: cp stock-scanner/docs/latest_data.json docs/latest_data.json

      - name: Sync dashboard data path
        run: |
          mkdir -p docs/data stock-scanner/docs/data
          cp stock-scanner/docs/latest_data.json docs/data/latest_data.json
          cp stock-scanner/docs/latest_data.json stock-scanner/docs/data/latest_data.json

      - name: Commit latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock-scanner/docs/latest_data.json docs/latest_data.json docs/data/latest_data.json stock-scanner/docs/data/latest_data.json
          git diff --cached --quiet || git commit -m "chore: update scanner data"
          git push
