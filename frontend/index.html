<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Scanner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Stock Momentum Intelligence</h1>
    <p id="mode"></p>
    <p id="lastUpdated"></p>
    <p id="totalAlerts"></p>

    <section class="card">
      <h2>Latest Signals</h2>
      <table>
        <thead>
          <tr><th>Ticker</th><th>Price</th><th>Daily %</th><th>15m %</th><th>Volume x</th><th>RelStr %</th><th>Conviction</th><th>Score</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </div>
<script src="app.js"></script>
</body>
</html>
